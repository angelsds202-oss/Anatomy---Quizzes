<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NMC-Style Anatomy & A&P Quizzes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="wrap">
    <div class="topbar">
      <div>
        <h1>🧠 NMC-Style A&P Quizzes</h1>
        <p class="sub">Prioritisation • safety • escalation • A&P with clinical reasoning</p>
      </div>
      <div class="top-actions">
        <button class="btn ghost" id="resetProgressBtn" title="Clears saved progress">Reset progress</button>
      </div>
    </div>

    <div class="panel">
      <div class="row">
        <div class="stat">
          <div class="k" id="statStreak">0</div>
          <div class="l">Streak</div>
        </div>
        <div class="stat">
          <div class="k" id="statAccuracy">0%</div>
          <div class="l">Overall accuracy</div>
        </div>
        <div class="stat">
          <div class="k" id="statAnswered">0</div>
          <div class="l">Answered</div>
        </div>
        <div class="stat">
          <div class="k" id="statTopics">0</div>
          <div class="l">Topics</div>
        </div>

        <div class="grow"></div>

        <div class="field">
          <label>Exam pack</label>
          <select id="packSelect"></select>
        </div>

        <div class="field">
          <label>Mode</label>
          <select id="modeSelect">
            <option value="quiz">Quiz (scored)</option>
            <option value="practice">Practice</option>
            <option value="weak">Weak Areas</option>
            <option value="spaced">Spaced Review</option>
          </select>
        </div>

        <div class="field">
          <label>Questions</label>
          <select id="limitSelect">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="15">15</option>
            <option value="25">25</option>
            <option value="999">All</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div class="field grow">
          <label>Search</label>
          <input id="searchInput" type="text" placeholder="Search topics/subtopics (e.g., ABG, AKI, sepsis, insulin)..." />
        </div>

        <div class="field">
          <label>Filter by subtopic</label>
          <select id="subtopicSelect">
            <option value="">All subtopics</option>
          </select>
        </div>

        <div class="field">
          <label>Sort</label>
          <select id="sortSelect">
            <option value="name">Topic name</option>
            <option value="weakest">Weakest first</option>
            <option value="mostAnswered">Most answered</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section id="homeSection">
      <div class="section-title">
        <h2>Body systems & safety packs</h2>
        <p class="sub">Pick a topic. Packs narrow what you see (Year 1/2/3 + safety).</p>
      </div>
      <div class="grid" id="topicGrid"></div>
    </section>

    <section id="quizSection" class="hidden">
      <div class="quiz-head">
        <div>
          <div class="pill" id="statusPill">Running</div>
          <h2 id="quizTitle">Topic</h2>
          <p class="sub" id="quizMeta">Question 1 of 10</p>
        </div>

        <div class="quiz-right">
          <div class="progress">
            <div class="bar" id="bar"></div>
          </div>
          <div class="scoreline">
            <span class="pill soft" id="packPill">Pack</span>
            <span class="pill soft" id="modePill">Mode</span>
            <span class="pill soft" id="scorePill">Score: 0</span>
          </div>
          <div class="actions">
            <button class="btn ghost" id="backBtn">← Home</button>
            <button class="btn ghost" id="revealBtn">Reveal</button>
            <button class="btn" id="nextBtn" disabled>Next →</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div id="questionArea"></div>
      </div>
    </section>
  </main>

  <!-- Question banks (multi-file) -->
  <script src="questions_core.js"></script>
  <script src="questions_cardio.js"></script>
  <script src="questions_resp.js"></script>
  <script src="questions_renal.js"></script>
  <script src="questions_neuro.js"></script>
  <script src="questions_endo_gi.js"></script>
  <script src="questions_infection_wounds.js"></script>
  <script src="questions_haem_repro.js"></script>

  <script src="app.js"></script>
</body>
</html>
